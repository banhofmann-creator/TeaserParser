services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: teaserparser
      POSTGRES_USER: teaserparser
      POSTGRES_PASSWORD: teaserparser
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teaserparser"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  uploads:
  pgdata:
